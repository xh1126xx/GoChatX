version: "3.8"

services:
  # ── Infrastructure ──
  mysql:
    image: mysql:8.0
    container_name: gochatx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: gochatx
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: gochatx-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gochatx-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ──
  authsvc:
    build:
      context: .
      dockerfile: Dockerfile
      target: authsvc
    container_name: gochatx-authsvc
    restart: unless-stopped
    environment:
      DB_DSN: ${DB_DSN:-root:changeme@tcp(mysql:3306)/gochatx?parseTime=true}
      JWT_SECRET: ${JWT_SECRET:-changeme-secret-key-at-least-32-chars}
      REDIS_ADDR: redis:6379
      LISTEN_ADDR: ":50051"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: gochatx-gateway
    restart: unless-stopped
    environment:
      # Viper config via env vars (prefix GOCHATX_)
      GOCHATX_AUTHSVC_ADDR: authsvc:50051
      GOCHATX_MONGO_URI: mongodb://mongodb:27017
      GOCHATX_MONGO_DB: gochatx
      GOCHATX_REDIS_ADDR: redis:6379
      GOCHATX_GATEWAY_LISTEN: ":8080"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    depends_on:
      authsvc:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: gochatx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway

volumes:
  mysql_data:
  mongo_data:
